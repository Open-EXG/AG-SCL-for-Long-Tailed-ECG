method: ag_scl

data:
  num_labels: 6
  signal_length: 1000
  num_windows: 50
  sampling_rate: 100.0
  input_channels: 1

model:
  patch_size: [1, 10]
  window_size: [3, 3]
  embed_dim: 64
  depths: [2, 2, 4]
  num_heads: 4
  feature_dim: 256
  projection_dim: 256
  dropout: 0.2
  attention_dropout: 0.2
  drop_path_rate: 0.1
  classifier_scale: 30.0

loss:
  embedding_dim: 256
  contrastive_weight: 1.0
  contrastive_temperature: 0.2
  shrinkage_tau: 800.0
  ala_lower_bound: 0.5
  ala_upper_bound: 3.0
  # The 0.01 values are the prior floor used in the reported experiments.
  label_state_priors:
    - [0.92807009, 0.07192991]
    - [0.96210835, 0.03789165]
    - [0.97077848, 0.02922152]
    - [0.99000000, 0.01000000]
    - [0.99000000, 0.01000000]
    - [0.98651314, 0.01348686]

augmentation:
  eligibility: any_positive_label
  num_augmented_views: 2
  transform_selection: uniform_per_view_batch
  transforms:
    signal_negation: 0.1
    global_amplitude_scaling: 0.5
    additive_jitter: 0.5
    frequency_masking: 0.5
    band_constrained_phase_jitter: 0.5
    band_constrained_magnitude_scaling: 0.5
    amplitude_scaling_std: 0.2
    jitter_std: 0.01
    frequency_mask_ratio: 0.3
